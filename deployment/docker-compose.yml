version: '3.8'

services:
  api:
    build:
      context: ..  # <--- Apunta a la raíz del código Go
      dockerfile: deployment/Dockerfile
      target: prod
    container_name: golang_api
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=production
      - SERVER_ADDRESS=:8080
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=pass
      - DB_NAME=api_db
      - DB_SSLMODE=disable
      - REDIS_HOST=redis_cache
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-my_super_secret_key_prod}
    depends_on:
      - postgres
      - redis
    networks:
      - api_network

  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: api_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - api_network

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - api_network

volumes:
  postgres_data:
  redis_data:

networks:
  api_network:
    driver: bridge
