version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golang_api
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=production
      - SERVER_ADDRESS=:8080
      - DATABASE_URL=postgres://user:pass@postgres:5432/api_db?sslmode=disable
      - REDIS_URL=redis:6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-my_super_secret_key_prod}
    depends_on:
      - postgres
      - redis
    networks:
      - api_network

  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: api_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - api_network

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - api_network

volumes:
  postgres_data:
  redis_data:

networks:
  api_network:
    driver: bridge
